[program:almiftah-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/almiftah/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=4
redirect_stderr=true
stdout_logfile=/var/www/html/almiftah/storage/logs/queue-worker.log
stopwaitsecs=3600
